site_name: parallel-in-scope
site_description: 面向 Java 8+ 的结构化并发工具包——协作式取消、快速失败、上下文传播、死锁检测、滑动窗口调度
site_url: https://huatalk.github.io/parallel-in-scope/
docs_dir: ../docs

repo_name: HuaTalk/parallel-in-scope
repo_url: https://github.com/HuaTalk/parallel-in-scope
edit_uri: edit/main/docs/

copyright: © parallel-in-scope — Apache License 2.0

nav:
  - 文档首页: index.md
  - 中文:
      - 文档中心: zh-CN/README.md
      - 完整使用指南: zh-CN/user-guide.md
      - API 与契约:
          - 协作式取消: zh-CN/reference/cooperative-cancellation.md
          - 空值注解: zh-CN/reference/nullability-annotations.md
      - 实现与设计:
          - ThreadRelay 内部机制: zh-CN/internals/thread-relay.md
          - 设计哲学: zh-CN/design/philosophy.md
          - Idea Graveyard: zh-CN/design/idea-graveyard.md
      - 测试与案例:
          - AsyncBatchResult 测试设计: zh-CN/testing/async-batch-result-report-test-design.md
          - AI 并发审查误报复盘: zh-CN/case-studies/ai-concurrency-review-false-positive.md
  - English:
      - Documentation: en/README.md
      - Full user guide: en/user-guide.md
  - Issues: https://github.com/HuaTalk/parallel-in-scope/issues

extra:
  generator: false
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/HuaTalk/parallel-in-scope
      name: GitHub

theme:
  name: material
  language: zh
  icon:
    repo: fontawesome/brands/github
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: 切换到暗色模式
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: 切换到亮色模式
  features:
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.code.annotate
    - content.tabs.link
    - navigation.tabs
    - navigation.sections
    - navigation.indexes
    - navigation.tracking
    - navigation.path
    - toc.follow
    - announce.dismiss

markdown_extensions:
  - abbr
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - tables
  - sane_lists
  - pymdownx.caret
  - pymdownx.critic
  - pymdownx.details
  - pymdownx.inlinehilite
  - pymdownx.mark
  - pymdownx.tilde
  - pymdownx.snippets
  - pymdownx.superfences
  - pymdownx.highlight:
      pygments_lang_class: true
  - pymdownx.extra:
      pymdownx.superfences:
        custom_fences:
          - name: mermaid
            class: mermaid
            format: pymdownx.superfences.fence_code_format
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true

plugins:
  - search
  - git-revision-date-localized

extra_css:
  - assets/stylesheets/extra.css
